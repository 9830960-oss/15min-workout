<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="15 MIN"/>
<title>15 MIN WORKOUT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #0a0a0a; color: #f0f0f0; font-family: 'Bebas Neue', Impact, sans-serif; }
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

#screen-home, #screen-workout, #screen-done { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 400px; }

.btn { background: #e63; color: #fff; border: none; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 16px 40px; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-ghost { background: transparent; border: 1px solid #444; color: #888; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; padding: 12px 20px; cursor: pointer; }

/* HOME */
.logo-icon { font-size: 56px; margin-bottom: 6px; }
.logo-title { font-size: clamp(52px, 13vw, 80px); letter-spacing: 4px; line-height: 1; }
.logo-title span { color: #e63; }
.logo-sub { font-family: 'Jost', sans-serif; font-size: 14px; color: #555; margin: 14px 0 20px; }
.ex-list { width: 100%; margin-bottom: 28px; }
.ex-item { display: flex; align-items: center; gap: 14px; background: #141414; border-radius: 7px; padding: 12px 16px; border-left: 3px solid #e63; margin-bottom: 8px; }
.ex-emoji { font-size: 22px; }
.ex-name { font-size: 18px; letter-spacing: 2px; text-align: left; }
.ex-desc { font-family: 'Jost', sans-serif; font-size: 12px; color: #555; margin-top: 2px; text-align: left; }
.ex-dur { margin-left: auto; font-family: 'Jost', sans-serif; font-size: 13px; color: #e63; }

/* WORKOUT */
.prog-wrap { width: 100%; height: 3px; background: #1a1a1a; border-radius: 2px; margin-bottom: 24px; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#e63,#ff8844); border-radius: 2px; transition: width 1s linear; width: 0%; }
.round-lbl { font-family: 'Jost', sans-serif; font-size: 13px; color: #555; letter-spacing: 3px; margin-bottom: 10px; }
.timer-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto 18px; }
.timer-wrap svg { position: absolute; top:0; left:0; transform: rotate(-90deg); }
.timer-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.timer-num { font-size: 52px; line-height: 1; }
.timer-lbl { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; margin-top: 2px; }
.ex-big { font-size: clamp(36px, 11vw, 60px); letter-spacing: 3px; line-height: 1.1; margin-bottom: 6px; }
.ex-hint-txt { font-family: 'Jost', sans-serif; font-size: 14px; color: #555; margin-bottom: 22px; }
.rest-big { font-size: clamp(32px, 10vw, 52px); letter-spacing: 3px; color: #3a9; margin-bottom: 6px; }
.next-hint { font-family: 'Jost', sans-serif; font-size: 14px; color: #444; margin-bottom: 22px; }
.ctrl-row { display: flex; gap: 10px; width: 100%; align-items: center; }
.ctrl-row .btn { font-size: 18px; padding: 13px 0; margin-top: 0; flex: 1.6; }
.ctrl-row .btn-ghost { font-size: 16px; padding: 11px 0; flex: 1; }
.dots { display: flex; gap: 7px; justify-content: center; margin-top: 22px; }
.dot { height: 8px; border-radius: 4px; background: #222; transition: all .3s; }

/* DONE */
.trophy { font-size: 70px; margin-bottom: 14px; }
.done-title { font-size: clamp(48px, 13vw, 72px); letter-spacing: 4px; line-height: 1; }
.done-sub { font-family: 'Jost', sans-serif; color: #555; margin: 14px 0 6px; font-size: 15px; }
.stats-row { display: flex; justify-content: center; gap: 28px; margin: 22px 0 28px; }
.stat-icon { font-size: 28px; }
.stat-lbl { font-family: 'Jost', sans-serif; font-size: 13px; color: #e63; letter-spacing: 2px; margin-top: 4px; }
</style>
</head>
<body>

<div id="screen-home">
  <div class="logo-icon">⚡</div>
  <h1 class="logo-title">15 MIN<br><span>WORKOUT</span></h1>
  <p class="logo-sub" id="home-sub"></p>
  <div class="ex-list" id="ex-list"></div>
  <button class="btn" onclick="startWorkout()">НАЧАТЬ ТРЕНИРОВКУ</button>
</div>

<div id="screen-workout">
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="round-lbl" id="round-lbl">РАУНД 1 / 3</div>
  <div class="timer-wrap">
    <svg width="140" height="140">
      <circle cx="70" cy="70" r="58" fill="none" stroke="#1a1a1a" stroke-width="7"/>
      <circle id="arc" cx="70" cy="70" r="58" fill="none" stroke="#e63" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="364.4" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-center">
      <span class="timer-num" id="timer-num">45</span>
      <span class="timer-lbl" id="timer-lbl" style="color:#e63">СЕК</span>
    </div>
  </div>
  <div id="work-block">
    <div class="ex-big" id="ex-big"></div>
    <div class="ex-hint-txt" id="ex-hint-txt"></div>
  </div>
  <div id="rest-block">
    <div class="rest-big">ОТДЫХ</div>
    <div class="next-hint" id="next-hint"></div>
  </div>
  <div class="ctrl-row">
    <button class="btn-ghost" onclick="exitWorkout()">✕</button>
    <button class="btn" id="pause-btn" onclick="togglePause()">⏸ ПАУЗА</button>
    <button class="btn-ghost" onclick="skipItem()">→</button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<div id="screen-done">
  <div class="trophy">🏆</div>
  <h2 class="done-title">ГОТОВО!</h2>
  <p class="done-sub">Ты завершил тренировку</p>
  <div class="stats-row">
    <div><div class="stat-icon">⏱</div><div class="stat-lbl">15 МИН</div></div>
    <div><div class="stat-icon">🔥</div><div class="stat-lbl" id="sets-lbl"></div></div>
    <div><div class="stat-icon">💪</div><div class="stat-lbl">5 УПР</div></div>
  </div>
  <button class="btn" onclick="startWorkout()">СНОВА ▶</button>
  <button class="btn-ghost" onclick="show('home')" style="width:100%;margin-top:12px">НА ГЛАВНУЮ</button>
</div>

<script>
const EX = [
  {name:"Отжимания", emoji:"💪", dur:45, rest:15, desc:"Руки на ширине плеч, корпус прямой"},
  {name:"Приседания", emoji:"🦵", dur:45, rest:15, desc:"Спина прямая, колени не выходят за носки"},
  {name:"Стульчик",  emoji:"🪑", dur:45, rest:15, desc:"Спина к стене, бёдра параллельны полу"},
  {name:"Планка",    emoji:"🔥", dur:45, rest:15, desc:"Тело прямое, взгляд в пол, не задерживай дыхание"},
  {name:"Выпады",    emoji:"🏃", dur:45, rest:15, desc:"Шаг вперёд, колено под прямым углом"},
];
const ROUNDS = 3;
const CIRC = 2 * Math.PI * 58;

function buildQ() {
  const q = [];
  for (let r=0; r<ROUNDS; r++)
    EX.forEach((ex,i) => {
      q.push({type:"work", ex, round:r+1});
      if (!(r===ROUNDS-1 && i===EX.length-1))
        q.push({type:"rest", ex, round:r+1});
    });
  return q;
}
const Q = buildQ();
const TOTAL = Q.reduce((s,x) => s + (x.type==="work" ? x.ex.dur : x.ex.rest), 0);

// Init home
document.getElementById('home-sub').textContent = `${ROUNDS} раунда · ${EX.length} упражнений · дома`;
document.getElementById('sets-lbl').textContent = `${EX.length*ROUNDS} СЕТ`;
EX.forEach(ex => {
  document.getElementById('ex-list').innerHTML +=
    `<div class="ex-item"><span class="ex-emoji">${ex.emoji}</span><div><div class="ex-name">${ex.name}</div><div class="ex-desc">${ex.desc}</div></div><div class="ex-dur">45с</div></div>`;
});
EX.forEach(() => {
  const d = document.createElement('div');
  d.className='dot'; d.style.width='8px';
  document.getElementById('dots').appendChild(d);
});

// State
let idx=0, timeLeft=0, running=false, elapsed=0, ticker=null, audioCtx=null;

function show(name) {
  ['home','workout','done'].forEach(n => {
    document.getElementById('screen-'+n).style.display = 'none';
  });
  document.getElementById('screen-'+name).style.display = 'flex';
  document.getElementById('screen-'+name).style.flexDirection = 'column';
}

function audio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(f,d,v) {
  try {
    const c=audio(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=f; o.type='sine';
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start(); o.stop(c.currentTime+d);
  } catch(e){}
}
function bGo()   { beep(1100,.25,.4); }
function bRest() { beep(440,.15,.3); setTimeout(()=>beep(440,.15,.3),250); }
function b321()  { beep(660,.08,.2); setTimeout(()=>beep(660,.08,.2),350); setTimeout(()=>beep(660,.08,.2),700); }
function bDone() { beep(523,.15,.3); setTimeout(()=>beep(659,.15,.3),180); setTimeout(()=>beep(784,.15,.3),360); setTimeout(()=>beep(1047,.3,.4),540); }

function render() {
  const item = Q[idx];
  const dur = item.type==='work' ? item.ex.dur : item.ex.rest;

  document.getElementById('round-lbl').textContent = `РАУНД ${item.round} / ${ROUNDS}`;
  document.getElementById('timer-num').textContent = timeLeft;

  const arc = document.getElementById('arc');
  arc.style.transition = 'none';
  arc.style.stroke = item.type==='rest' ? '#3a9' : '#e63';
  arc.style.strokeDashoffset = 0;

  const lbl = document.getElementById('timer-lbl');
  lbl.style.color = item.type==='rest' ? '#3a9' : '#e63';
  lbl.textContent = item.type==='rest' ? 'ОТДЫХ' : 'СЕК';

  if (item.type==='work') {
    document.getElementById('work-block').style.display = 'block';
    document.getElementById('rest-block').style.display = 'none';
    document.getElementById('ex-big').textContent = item.ex.emoji+' '+item.ex.name.toUpperCase();
    document.getElementById('ex-hint-txt').textContent = item.ex.desc;
  } else {
    document.getElementById('work-block').style.display = 'none';
    document.getElementById('rest-block').style.display = 'block';
    const nx = Q[idx+1];
    document.getElementById('next-hint').textContent = nx ? 'Следующее: '+nx.ex.emoji+' '+nx.ex.name : '';
  }

  const dots = document.getElementById('dots').children;
  EX.forEach((ex,i) => {
    const active = ex===item.ex;
    dots[i].style.width = active ? '28px' : '8px';
    dots[i].style.background = active ? '#e63' : '#222';
  });
}

function updateArc() {
  const item = Q[idx];
  const dur = item.type==='work' ? item.ex.dur : item.ex.rest;
  const arc = document.getElementById('arc');
  arc.style.transition = 'stroke-dashoffset 1s linear';
  arc.style.strokeDashoffset = CIRC * (1 - timeLeft/dur);
  document.getElementById('timer-num').textContent = timeLeft;
  document.getElementById('prog-fill').style.width = Math.min(elapsed/TOTAL,1)*100+'%';
}

function tick() {
  if (timeLeft===4) b321();
  if (timeLeft<=1) {
    clearInterval(ticker); ticker=null;
    const nx=idx+1;
    if (nx>=Q.length) { bDone(); show('done'); running=false; return; }
    idx=nx; elapsed++;
    timeLeft = Q[idx].type==='work' ? Q[idx].ex.dur : Q[idx].ex.rest;
    Q[idx].type==='work' ? bGo() : bRest();
    render(); updateArc();
    if (running) { ticker=setInterval(tick,1000); }
    return;
  }
  timeLeft--; elapsed++;
  updateArc();
}

function startWorkout() {
  idx=0; elapsed=0; running=true;
  timeLeft = Q[0].ex.dur;
  show('workout');
  render(); updateArc();
  document.getElementById('pause-btn').textContent='⏸ ПАУЗА';
  ticker=setInterval(tick,1000);
  setTimeout(bGo,300);
}

function togglePause() {
  running=!running;
  document.getElementById('pause-btn').textContent = running ? '⏸ ПАУЗА' : '▶ СТАРТ';
  if (running) { ticker=setInterval(tick,1000); }
  else { clearInterval(ticker); ticker=null; }
}

function skipItem() {
  clearInterval(ticker); ticker=null;
  const nx=idx+1;
  if (nx>=Q.length) { show('done'); running=false; return; }
  idx=nx;
  timeLeft = Q[idx].type==='work' ? Q[idx].ex.dur : Q[idx].ex.rest;
  render(); updateArc();
  if (running) ticker=setInterval(tick,1000);
}

function exitWorkout() {
  clearInterval(ticker); ticker=null; running=false;
  show('home');
}

// Start on home
show('home');
</script>
</body>
</html>
